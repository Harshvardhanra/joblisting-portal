<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentBridge – Employer Dashboard</title>
<link rel="stylesheet" href="../css/shared.css">
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sidebar-logo"><h2>Talent<span>Bridge</span></h2><p>Employer Portal</p></div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sb-avatar">E</div>
      <div class="user-info"><p id="sb-name">Employer</p><span id="sb-role">Employer</span></div>
    </div>
    <div class="sidebar-nav">
      <a class="nav-item active" href="employer-dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a class="nav-item" href="manage-jobs.html"><span class="icon">💼</span> Manage Jobs</a>
      <a class="nav-item" href="view-applications.html"><span class="icon">👥</span> Applications</a>
      <a class="nav-item" href="employer-profile.html"><span class="icon">🏢</span> Company Profile</a>
    </div>
    <div class="sidebar-footer"><button class="logout-btn" onclick="logout()">🚪 Sign Out</button></div>
  </nav>

  <div class="main">
    <div class="topbar">
      <h1>Employer Dashboard</h1>
      <a href="manage-jobs.html" class="btn btn-primary">+ Post a Job</a>
    </div>
    <div class="content">
      <div class="stats-grid" id="stats-grid"></div>

      <div class="card">
        <div class="section-header">
          <h2>Your Job Listings</h2>
          <a href="manage-jobs.html" class="btn btn-outline btn-sm">Manage All →</a>
        </div>
        <div id="my-jobs"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="global-toast"></div>
<script src="../js/app.js"></script>
<script>
  const user = requireAuth('employer');
  renderSidebarUser();

  const jobs = getJobs().filter(j=>j.postedBy===user.email);
  const totalApps = jobs.reduce((s,j)=>s+j.applications.length,0);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-icon gold">💼</div><div><div class="stat-num">${jobs.length}</div><div class="stat-label">Jobs Posted</div></div></div>
    <div class="stat-card"><div class="stat-icon blue">👥</div><div><div class="stat-num">${totalApps}</div><div class="stat-label">Total Applications</div></div></div>
    <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-num">${jobs.reduce((s,j)=>s+j.applications.filter(a=>a.status==='accepted').length,0)}</div><div class="stat-label">Accepted</div></div></div>
    <div class="stat-card"><div class="stat-icon red">⏳</div><div><div class="stat-num">${jobs.reduce((s,j)=>s+j.applications.filter(a=>a.status==='pending').length,0)}</div><div class="stat-label">Pending Review</div></div></div>
  `;

  const cont = document.getElementById('my-jobs');
  if(!jobs.length){ cont.innerHTML='<div class="empty"><div class="icon">📭</div><p>No jobs posted yet. <a href="manage-jobs.html" style="color:var(--gold)">Post your first job →</a></p></div>'; }
  else {
    cont.innerHTML = jobs.slice(-5).reverse().map(job=>
      jobCardHTML(job,`
        <span class="badge badge-pending">${job.applications.length} applicants</span>
        <a href="view-applications.html" class="btn btn-outline btn-sm">View Apps</a>
      `)
    ).join('');
  }
</script>
</body>
</html>
