<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentBridge – Seeker Dashboard</title>
<link rel="stylesheet" href="../css/shared.css">
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h2>Talent<span>Bridge</span></h2>
      <p>Job Seeker Portal</p>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sb-avatar">A</div>
      <div class="user-info">
        <p id="sb-name">User</p>
        <span id="sb-role">Job Seeker</span>
      </div>
    </div>
    <div class="sidebar-nav">
      <a class="nav-item active" href="seeker-dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a class="nav-item" href="job-search.html"><span class="icon">🔍</span> Browse Jobs</a>
      <a class="nav-item" href="my-applications.html"><span class="icon">📋</span> My Applications</a>
      <a class="nav-item" href="seeker-profile.html"><span class="icon">👤</span> My Profile</a>
    </div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">🚪 Sign Out</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <h1>Dashboard</h1>
      <div class="topbar-actions">
        <a href="job-search.html" class="btn btn-primary">🔍 Browse Jobs</a>
      </div>
    </div>
    <div class="content">
      <!-- STATS -->
      <div class="stats-grid" id="stats-grid"></div>

      <!-- RECENT JOBS -->
      <div class="card">
        <div class="section-header">
          <h2>Latest Job Listings</h2>
          <a href="job-search.html" class="btn btn-outline btn-sm">View All →</a>
        </div>
        <div id="recent-jobs"></div>
      </div>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  const user = requireAuth('seeker');
  renderSidebarUser();

  const jobs = getJobs();
  const myApps = jobs.flatMap(j => j.applications.filter(a => a.email === user.email));

  // Stats
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-icon gold">💼</div><div><div class="stat-num">${jobs.length}</div><div class="stat-label">Jobs Available</div></div></div>
    <div class="stat-card"><div class="stat-icon blue">📋</div><div><div class="stat-num">${myApps.length}</div><div class="stat-label">Applied</div></div></div>
    <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-num">${myApps.filter(a=>a.status==='accepted').length}</div><div class="stat-label">Accepted</div></div></div>
    <div class="stat-card"><div class="stat-icon red">⏳</div><div><div class="stat-num">${myApps.filter(a=>a.status==='pending').length}</div><div class="stat-label">Pending</div></div></div>
  `;

  // Recent jobs
  const recentJobs = jobs.slice(-5).reverse();
  const cont = document.getElementById('recent-jobs');
  if(!recentJobs.length){ cont.innerHTML='<div class="empty"><div class="icon">📭</div><p>No jobs posted yet</p></div>'; }
  else {
    cont.innerHTML = recentJobs.map(job => {
      const applied = job.applications.some(a => a.email === user.email);
      return jobCardHTML(job, `
        <span style="font-size:0.78rem;color:var(--muted)">${fmtDate(job.createdAt)}</span>
        ${applied
          ? '<span class="badge badge-pending">Applied</span>'
          : `<a href="job-search.html" class="btn btn-primary btn-sm">Apply</a>`}
      `);
    }).join('');
  }
</script>
</body>
</html>
