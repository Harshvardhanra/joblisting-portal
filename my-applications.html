<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentBridge – My Applications</title>
<link rel="stylesheet" href="../css/shared.css">
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sidebar-logo"><h2>Talent<span>Bridge</span></h2><p>Job Seeker Portal</p></div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sb-avatar">A</div>
      <div class="user-info"><p id="sb-name">User</p><span id="sb-role">Job Seeker</span></div>
    </div>
    <div class="sidebar-nav">
      <a class="nav-item" href="seeker-dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a class="nav-item" href="job-search.html"><span class="icon">🔍</span> Browse Jobs</a>
      <a class="nav-item active" href="my-applications.html"><span class="icon">📋</span> My Applications</a>
      <a class="nav-item" href="seeker-profile.html"><span class="icon">👤</span> My Profile</a>
    </div>
    <div class="sidebar-footer"><button class="logout-btn" onclick="logout()">🚪 Sign Out</button></div>
  </nav>

  <div class="main">
    <div class="topbar">
      <h1>My Applications</h1>
      <div style="display:flex;gap:8px">
        <select id="status-filter" onchange="render()" style="padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;outline:none">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="accepted">Accepted</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
    </div>
    <div class="content">
      <div id="app-list"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="d-title">Application Details</h2>
      <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<div class="toast" id="global-toast"></div>
<script src="../js/app.js"></script>
<script>
  const user = requireAuth('seeker');
  renderSidebarUser();

  function render(){
    const sf = document.getElementById('status-filter').value;
    const jobs = getJobs();
    const myApps = [];
    jobs.forEach(job=>{
      job.applications.filter(a=>a.email===user.email && (!sf||a.status===sf)).forEach(app=>{
        myApps.push({job, app});
      });
    });
    const cont = document.getElementById('app-list');
    if(!myApps.length){ cont.innerHTML='<div class="empty"><div class="icon">📋</div><p>No applications found</p></div>'; return; }
    cont.innerHTML = myApps.map(({job,app})=>`
      <div class="job-card" style="cursor:default">
        <div class="job-logo">💼</div>
        <div class="job-info">
          <div class="job-title">${job.title}</div>
          <div class="job-company">${job.company}</div>
          <div class="job-tags">
            <span class="tag tag-loc">📍 ${job.location}</span>
            <span class="tag tag-type">${job.type}</span>
            <span class="tag tag-salary">💰 ${job.salary}</span>
          </div>
          <p style="font-size:0.82rem;color:var(--muted);margin-top:6px">Applied: ${fmtDate(app.appliedAt)}</p>
        </div>
        <div class="job-actions" style="align-items:flex-end">
          <span class="badge badge-${app.status}">${app.status.charAt(0).toUpperCase()+app.status.slice(1)}</span>
          <button class="btn btn-outline btn-sm" onclick='showDetail(${JSON.stringify(job).replace(/'/g,"&apos;")},${JSON.stringify(app).replace(/'/g,"&apos;")})'>View Details</button>
        </div>
      </div>
    `).join('');
  }

  function showDetail(job,app){
    document.getElementById('d-title').textContent = job.title + ' @ ' + job.company;
    document.getElementById('detail-body').innerHTML = `
      <div style="margin-bottom:20px">
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">
          <span class="tag tag-loc">📍 ${job.location}</span>
          <span class="tag tag-type">${job.type}</span>
          <span class="tag tag-salary">💰 ${job.salary}</span>
        </div>
        <p style="font-size:0.85rem;color:var(--muted)">Applied on ${fmtDate(app.appliedAt)}</p>
      </div>
      <div class="form-group"><label>Application Status</label>
        <div><span class="badge badge-${app.status}" style="padding:8px 16px;font-size:0.9rem">${app.status.charAt(0).toUpperCase()+app.status.slice(1)}</span></div>
      </div>
      <div class="form-group"><label>Cover Letter Submitted</label>
        <div style="background:#f8fafc;border-radius:10px;padding:14px;font-size:0.9rem;line-height:1.6;color:var(--text)">${app.coverLetter}</div>
      </div>
      ${app.resume?`<div class="form-group"><label>Resume Link</label><a href="${app.resume}" target="_blank" style="color:var(--gold)">${app.resume}</a></div>`:''}
      <hr style="margin:20px 0;border-color:var(--border)">
      <div class="form-group"><label>Job Description</label><p style="line-height:1.7">${job.description}</p></div>
    `;
    openModal('detail-modal');
  }

  render();
</script>
</body>
</html>
